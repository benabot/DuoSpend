# Codex config locale pour DuoSpend
# Placer à la racine du repo : .codex/config.toml
#
# Documentation : https://developers.openai.com/codex/guides/agents-md

# Fichiers d'instructions à charger en plus de AGENTS.md
project_doc_fallback_filenames = ["CLAUDE.md"]

# Autoriser des fichiers d'instructions jusqu'à 96 KB (plus large que default 32 KB)
project_doc_max_bytes = 98304

# Répertoires à exclure des scans
[[ignore]]
path = "Preview Content"
path = ".build"
path = "DerivedData"
path = "*.xcuserdatad"
path = "*.xcworkspace/xcuserdata"

# Commandes racine utiles pour Codex
# (ces commandes sont informatives — Codex peut les suggérer à l'utilisateur)
[commands]
build = "xcodebuild -scheme DuoSpend -destination 'platform=iOS Simulator,name=iPhone 16 Pro' build 2>&1 | grep -E '^.*(error:|BUILD)' | grep -v appintents"
test = "xcodebuild -scheme DuoSpend -destination 'platform=iOS Simulator,name=iPhone 16 Pro' test 2>&1 | grep -E 'passed|failed|error'"
clean = "xcodebuild -scheme DuoSpend clean"
archive = "xcodebuild -scheme DuoSpend -configuration Release -destination 'generic/platform=iOS' -archivePath /tmp/DuoSpend.xcarchive archive"
